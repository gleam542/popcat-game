<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PopCat Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
        }

        h1 {
            color: #fff;
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.8);
        }

        #score {
            color: #ff6b6b;
            font-size: 64px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(255, 107, 107, 0.5);
            transition: transform 0.05s;
        }

        #score.pop {
            transform: scale(1.2);
        }

        #cat-container {
            position: relative;
            cursor: pointer;
            transition: transform 0.05s;
        }

        #cat-container:active {
            transform: scale(0.95);
        }

        .cat-svg {
            width: 300px;
            height: 300px;
        }

        /* 點擊特效 */
        .pop-text {
            position: absolute;
            color: #ffe66d;
            font-size: 32px;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            text-shadow: 0 0 10px rgba(255, 230, 109, 0.8);
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            animation: particleBurst 0.6s ease-out forwards;
        }

        @keyframes particleBurst {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
        }

        #pps {
            color: #aaa;
            font-size: 18px;
            margin-top: 15px;
        }

        #instructions {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }

        #bruise-msg {
            color: #b388ff;
            font-size: 24px;
            font-weight: bold;
            margin-top: 10px;
            text-shadow: 0 0 15px rgba(179, 136, 255, 0.6);
            display: none;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }

        /* 500 KO 效果 */
        .screen-shake {
            animation: bigShake 0.6s ease-in-out;
        }

        @keyframes bigShake {
            0%, 100% { transform: translate(0, 0) rotate(0); }
            10% { transform: translate(-15px, -10px) rotate(-2deg); }
            20% { transform: translate(15px, 10px) rotate(2deg); }
            30% { transform: translate(-10px, 5px) rotate(-1deg); }
            40% { transform: translate(10px, -5px) rotate(1deg); }
            50% { transform: translate(-5px, 10px) rotate(-2deg); }
            60% { transform: translate(5px, -10px) rotate(2deg); }
            70% { transform: translate(-15px, 5px) rotate(-1deg); }
            80% { transform: translate(15px, -5px) rotate(1deg); }
            90% { transform: translate(-5px, -5px) rotate(0); }
        }

        .stars-container {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 40px;
            animation: spinStars 2s linear infinite;
            pointer-events: none;
        }

        @keyframes spinStars {
            0% { transform: translateX(-50%) rotate(0deg); }
            100% { transform: translateX(-50%) rotate(360deg); }
        }

        .star {
            position: absolute;
            font-size: 24px;
            animation: twinkle 0.5s ease-in-out infinite alternate;
        }

        .star:nth-child(1) { left: 0; top: 5px; animation-delay: 0s; }
        .star:nth-child(2) { left: 45px; top: -5px; animation-delay: 0.15s; }
        .star:nth-child(3) { left: 90px; top: 5px; animation-delay: 0.3s; }

        @keyframes twinkle {
            0% { opacity: 0.4; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        #ko-flash {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 999;
            transition: opacity 0.1s;
        }

        /* 1000+ 隨機效果 */
        .emoji-float {
            position: fixed;
            font-size: 40px;
            pointer-events: none;
            z-index: 998;
            animation: emojiDrop 1.5s ease-in forwards;
        }

        @keyframes emojiDrop {
            0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
            100% { opacity: 0; transform: translateY(100vh) rotate(720deg) scale(0.3); }
        }

        @keyframes catSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes catBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-60px); }
        }

        @keyframes catWobble {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(-15deg) scale(1.1); }
            50% { transform: rotate(15deg) scale(0.9); }
            75% { transform: rotate(-10deg) scale(1.05); }
            100% { transform: rotate(0deg) scale(1); }
        }

        @keyframes catJelly {
            0% { transform: scaleX(1) scaleY(1); }
            25% { transform: scaleX(1.3) scaleY(0.7); }
            50% { transform: scaleX(0.7) scaleY(1.3); }
            75% { transform: scaleX(1.15) scaleY(0.85); }
            100% { transform: scaleX(1) scaleY(1); }
        }

        @keyframes catFlipX {
            0% { transform: perspective(400px) rotateY(0deg); }
            100% { transform: perspective(400px) rotateY(360deg); }
        }

        @keyframes catFlipY {
            0% { transform: perspective(400px) rotateX(0deg); }
            100% { transform: perspective(400px) rotateX(360deg); }
        }

        @keyframes screenPulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(2); }
        }

        @keyframes glitchShift {
            0% { clip-path: inset(0 0 90% 0); transform: translateX(-10px); }
            20% { clip-path: inset(30% 0 50% 0); transform: translateX(10px); }
            40% { clip-path: inset(60% 0 20% 0); transform: translateX(-5px); }
            60% { clip-path: inset(10% 0 70% 0); transform: translateX(5px); }
            80% { clip-path: inset(80% 0 5% 0); transform: translateX(-10px); }
            100% { clip-path: inset(0); transform: translateX(0); }
        }

        @keyframes rainbowBg {
            0% { background-color: #ff0000; }
            17% { background-color: #ff8800; }
            33% { background-color: #ffff00; }
            50% { background-color: #00ff00; }
            67% { background-color: #0088ff; }
            83% { background-color: #8800ff; }
            100% { background-color: #ff0000; }
        }

        .screen-flash-color {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 997;
            opacity: 0;
            transition: opacity 0.15s;
        }

        /* 2500 黑洞模式 */
        #blackhole-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 996;
            opacity: 0;
            background: radial-gradient(circle at 50% 50%, transparent 0%, transparent 20%, rgba(0,0,0,0.8) 60%, #000 100%);
            transition: opacity 0.5s;
        }

        @keyframes suckIn {
            0% { transform: scale(1) rotate(0deg); filter: none; }
            50% { transform: scale(0.3) rotate(360deg); filter: blur(2px); }
            100% { transform: scale(1) rotate(720deg); filter: none; }
        }

        @keyframes vortexSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .vortex-particle {
            position: fixed;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 997;
            animation: spiralIn 1.5s ease-in forwards;
        }

        @keyframes spiralIn {
            0% { opacity: 1; }
            100% { opacity: 0; transform: translate(var(--ex), var(--ey)) scale(0); }
        }

        /* 3000 矩陣模式 */
        #matrix-canvas {
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 995;
            opacity: 0;
            transition: opacity 0.5s;
        }

        /* 5000 涅槃模式 */
        .halo {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 30px;
            border: 3px solid #ffd700;
            border-radius: 50%;
            box-shadow: 0 0 15px #ffd700, 0 0 30px rgba(255, 215, 0, 0.5);
            animation: haloGlow 1.5s ease-in-out infinite alternate;
            pointer-events: none;
            display: none;
        }

        @keyframes haloGlow {
            0% { box-shadow: 0 0 15px #ffd700, 0 0 30px rgba(255, 215, 0, 0.3); }
            100% { box-shadow: 0 0 25px #ffd700, 0 0 50px rgba(255, 215, 0, 0.6), 0 0 80px rgba(255, 215, 0, 0.2); }
        }

        .firework {
            position: fixed;
            pointer-events: none;
            z-index: 998;
        }

        .firework-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            animation: fireworkBurst 1s ease-out forwards;
        }

        @keyframes fireworkBurst {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--fx), var(--fy)) scale(0); }
        }

        @keyframes nirvanaGlow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(255,215,0,0.5)); }
            50% { filter: drop-shadow(0 0 30px rgba(255,215,0,0.9)) drop-shadow(0 0 60px rgba(255,215,0,0.3)); }
        }
    </style>
</head>
<body>
    <div id="ko-flash"></div>
    <div id="color-flash" class="screen-flash-color"></div>
    <div id="blackhole-overlay"></div>
    <canvas id="matrix-canvas"></canvas>
    <h1>POP CAT!</h1>
    <div id="score">0</div>
    <div id="cat-container" onmousedown="popCat(event)" ontouchstart="popCat(event)">
        <!-- 閉嘴貓 -->
        <svg id="cat-closed" class="cat-svg" viewBox="0 0 300 300">
            <!-- 耳朵 -->
            <polygon points="60,120 90,30 130,110" fill="#ff9a56"/>
            <polygon points="70,110 95,50 120,105" fill="#ffb88c"/>
            <polygon points="240,120 210,30 170,110" fill="#ff9a56"/>
            <polygon points="230,110 205,50 180,105" fill="#ffb88c"/>
            <!-- 頭 -->
            <ellipse cx="150" cy="180" rx="110" ry="100" fill="#ff9a56"/>
            <!-- 臉內部 -->
            <ellipse cx="150" cy="190" rx="85" ry="75" fill="#ffb88c"/>
            <!-- 眼睛 -->
            <ellipse cx="115" cy="165" rx="18" ry="20" fill="#fff"/>
            <ellipse cx="185" cy="165" rx="18" ry="20" fill="#fff"/>
            <ellipse cx="115" cy="165" rx="10" ry="12" fill="#2d2d2d"/>
            <ellipse cx="185" cy="165" rx="10" ry="12" fill="#2d2d2d"/>
            <!-- 眼睛高光 -->
            <circle cx="120" cy="160" r="4" fill="#fff"/>
            <circle cx="190" cy="160" r="4" fill="#fff"/>
            <!-- 鼻子 -->
            <ellipse cx="150" cy="195" rx="8" ry="5" fill="#ff6b6b"/>
            <!-- 閉嘴 -->
            <path d="M 130 205 Q 150 215 170 205" stroke="#2d2d2d" stroke-width="3" fill="none" stroke-linecap="round"/>
            <!-- 鬍鬚 -->
            <line x1="50" y1="190" x2="100" y2="195" stroke="#2d2d2d" stroke-width="2"/>
            <line x1="50" y1="205" x2="100" y2="205" stroke="#2d2d2d" stroke-width="2"/>
            <line x1="200" y1="195" x2="250" y2="190" stroke="#2d2d2d" stroke-width="2"/>
            <line x1="200" y1="205" x2="250" y2="205" stroke="#2d2d2d" stroke-width="2"/>
        </svg>
        <!-- 張嘴貓 -->
        <svg id="cat-open" class="cat-svg" viewBox="0 0 300 300" style="display:none;">
            <!-- 耳朵 -->
            <polygon points="60,120 90,30 130,110" fill="#ff9a56"/>
            <polygon points="70,110 95,50 120,105" fill="#ffb88c"/>
            <polygon points="240,120 210,30 170,110" fill="#ff9a56"/>
            <polygon points="230,110 205,50 180,105" fill="#ffb88c"/>
            <!-- 頭 -->
            <ellipse cx="150" cy="180" rx="110" ry="100" fill="#ff9a56"/>
            <!-- 臉內部 -->
            <ellipse cx="150" cy="190" rx="85" ry="75" fill="#ffb88c"/>
            <!-- 眼睛（張大） -->
            <ellipse cx="115" cy="160" rx="20" ry="24" fill="#fff"/>
            <ellipse cx="185" cy="160" rx="20" ry="24" fill="#fff"/>
            <ellipse cx="115" cy="160" rx="12" ry="14" fill="#2d2d2d"/>
            <ellipse cx="185" cy="160" rx="12" ry="14" fill="#2d2d2d"/>
            <!-- 眼睛高光 -->
            <circle cx="121" cy="155" r="5" fill="#fff"/>
            <circle cx="191" cy="155" r="5" fill="#fff"/>
            <!-- 鼻子 -->
            <ellipse cx="150" cy="192" rx="8" ry="5" fill="#ff6b6b"/>
            <!-- 張嘴 -->
            <ellipse cx="150" cy="220" rx="30" ry="22" fill="#2d2d2d"/>
            <ellipse cx="150" cy="215" rx="25" ry="12" fill="#ff4757"/>
            <!-- 舌頭 -->
            <ellipse cx="150" cy="230" rx="12" ry="8" fill="#ff6b81"/>
            <!-- 鬍鬚 -->
            <line x1="45" y1="185" x2="95" y2="192" stroke="#2d2d2d" stroke-width="2"/>
            <line x1="45" y1="200" x2="95" y2="200" stroke="#2d2d2d" stroke-width="2"/>
            <line x1="205" y1="192" x2="255" y2="185" stroke="#2d2d2d" stroke-width="2"/>
            <line x1="205" y1="200" x2="255" y2="200" stroke="#2d2d2d" stroke-width="2"/>
        </svg>
        <!-- 瘀青閉嘴貓 -->
        <svg id="cat-bruised-closed" class="cat-svg" viewBox="0 0 300 300" style="display:none;">
            <!-- 耳朵 -->
            <polygon points="60,120 90,30 130,110" fill="#7c6bad"/>
            <polygon points="70,110 95,50 120,105" fill="#9a85c4"/>
            <polygon points="240,120 210,30 170,110" fill="#7c6bad"/>
            <polygon points="230,110 205,50 180,105" fill="#9a85c4"/>
            <!-- 頭 -->
            <ellipse cx="150" cy="180" rx="110" ry="100" fill="#7c6bad"/>
            <!-- 臉內部 -->
            <ellipse cx="150" cy="190" rx="85" ry="75" fill="#9a85c4"/>
            <!-- 瘀青斑塊 -->
            <ellipse cx="100" cy="175" rx="25" ry="18" fill="#5c3d8f" opacity="0.5"/>
            <ellipse cx="195" cy="170" rx="20" ry="15" fill="#4a2d7a" opacity="0.4"/>
            <circle cx="170" cy="210" r="12" fill="#5c3d8f" opacity="0.3"/>
            <!-- 眼睛（暈眩旋轉） -->
            <ellipse cx="115" cy="165" rx="18" ry="20" fill="#fff"/>
            <ellipse cx="185" cy="165" rx="18" ry="20" fill="#fff"/>
            <!-- X 眼 -->
            <line x1="107" y1="157" x2="123" y2="173" stroke="#2d2d2d" stroke-width="3" stroke-linecap="round"/>
            <line x1="123" y1="157" x2="107" y2="173" stroke="#2d2d2d" stroke-width="3" stroke-linecap="round"/>
            <line x1="177" y1="157" x2="193" y2="173" stroke="#2d2d2d" stroke-width="3" stroke-linecap="round"/>
            <line x1="193" y1="157" x2="177" y2="173" stroke="#2d2d2d" stroke-width="3" stroke-linecap="round"/>
            <!-- 鼻子 -->
            <ellipse cx="150" cy="195" rx="8" ry="5" fill="#cc5577"/>
            <!-- 閉嘴（委屈） -->
            <path d="M 130 210 Q 150 200 170 210" stroke="#2d2d2d" stroke-width="3" fill="none" stroke-linecap="round"/>
            <!-- 鬍鬚 -->
            <line x1="50" y1="190" x2="100" y2="195" stroke="#2d2d2d" stroke-width="2"/>
            <line x1="50" y1="205" x2="100" y2="205" stroke="#2d2d2d" stroke-width="2"/>
            <line x1="200" y1="195" x2="250" y2="190" stroke="#2d2d2d" stroke-width="2"/>
            <line x1="200" y1="205" x2="250" y2="205" stroke="#2d2d2d" stroke-width="2"/>
            <!-- OK繃 -->
            <rect x="175" y="140" width="35" height="16" rx="4" fill="#f5deb3" transform="rotate(-20, 192, 148)"/>
            <line x1="182" y1="145" x2="182" y2="153" stroke="#deb887" stroke-width="1" transform="rotate(-20, 192, 148)"/>
            <line x1="203" y1="145" x2="203" y2="153" stroke="#deb887" stroke-width="1" transform="rotate(-20, 192, 148)"/>
        </svg>
        <!-- 瘀青張嘴貓 -->
        <svg id="cat-bruised-open" class="cat-svg" viewBox="0 0 300 300" style="display:none;">
            <!-- 耳朵 -->
            <polygon points="60,120 90,30 130,110" fill="#7c6bad"/>
            <polygon points="70,110 95,50 120,105" fill="#9a85c4"/>
            <polygon points="240,120 210,30 170,110" fill="#7c6bad"/>
            <polygon points="230,110 205,50 180,105" fill="#9a85c4"/>
            <!-- 頭 -->
            <ellipse cx="150" cy="180" rx="110" ry="100" fill="#7c6bad"/>
            <!-- 臉內部 -->
            <ellipse cx="150" cy="190" rx="85" ry="75" fill="#9a85c4"/>
            <!-- 瘀青斑塊 -->
            <ellipse cx="100" cy="175" rx="25" ry="18" fill="#5c3d8f" opacity="0.5"/>
            <ellipse cx="195" cy="170" rx="20" ry="15" fill="#4a2d7a" opacity="0.4"/>
            <circle cx="170" cy="210" r="12" fill="#5c3d8f" opacity="0.3"/>
            <!-- 眼睛 -->
            <ellipse cx="115" cy="160" rx="20" ry="24" fill="#fff"/>
            <ellipse cx="185" cy="160" rx="20" ry="24" fill="#fff"/>
            <!-- X 眼 -->
            <line x1="105" y1="150" x2="125" y2="170" stroke="#2d2d2d" stroke-width="3" stroke-linecap="round"/>
            <line x1="125" y1="150" x2="105" y2="170" stroke="#2d2d2d" stroke-width="3" stroke-linecap="round"/>
            <line x1="175" y1="150" x2="195" y2="170" stroke="#2d2d2d" stroke-width="3" stroke-linecap="round"/>
            <line x1="195" y1="150" x2="175" y2="170" stroke="#2d2d2d" stroke-width="3" stroke-linecap="round"/>
            <!-- 鼻子 -->
            <ellipse cx="150" cy="192" rx="8" ry="5" fill="#cc5577"/>

            <!-- 鬍鬚 -->
            <line x1="45" y1="185" x2="95" y2="192" stroke="#2d2d2d" stroke-width="2"/>
            <line x1="45" y1="200" x2="95" y2="200" stroke="#2d2d2d" stroke-width="2"/>
            <line x1="205" y1="192" x2="255" y2="185" stroke="#2d2d2d" stroke-width="2"/>
            <line x1="205" y1="200" x2="255" y2="200" stroke="#2d2d2d" stroke-width="2"/>
            <!-- OK繃 -->
            <rect x="175" y="140" width="35" height="16" rx="4" fill="#f5deb3" transform="rotate(-20, 192, 148)"/>
            <line x1="182" y1="145" x2="182" y2="153" stroke="#deb887" stroke-width="1" transform="rotate(-20, 192, 148)"/>

        </svg>
        <!-- KO 閉嘴貓 (500) -->
        <svg id="cat-ko-closed" class="cat-svg" viewBox="0 0 300 300" style="display:none;">
            <!-- 耳朵（破損） -->
            <polygon points="60,120 90,30 130,110" fill="#5a3d7a"/>
            <polygon points="70,110 95,50 120,105" fill="#7a5a9a"/>
            <polygon points="240,120 210,30 170,110" fill="#5a3d7a"/>
            <polygon points="230,110 205,50 180,105" fill="#7a5a9a"/>
            <!-- 耳朵缺口 -->
            <polygon points="215,45 225,55 210,60" fill="#1a0a25"/>
            <!-- 頭 -->
            <ellipse cx="150" cy="180" rx="110" ry="100" fill="#5a3d7a"/>
            <!-- 臉內部 -->
            <ellipse cx="150" cy="190" rx="85" ry="75" fill="#7a5a9a"/>
            <!-- 大片瘀青 -->
            <ellipse cx="100" cy="170" rx="30" ry="22" fill="#3d1f5c" opacity="0.6"/>
            <ellipse cx="195" cy="165" rx="28" ry="20" fill="#2d1050" opacity="0.5"/>
            <circle cx="130" cy="215" r="15" fill="#3d1f5c" opacity="0.4"/>
            <ellipse cx="175" cy="205" rx="18" ry="12" fill="#2d1050" opacity="0.35"/>
            <!-- 眼睛底 -->
            <ellipse cx="115" cy="165" rx="18" ry="20" fill="#fff"/>
            <ellipse cx="185" cy="165" rx="18" ry="20" fill="#fff"/>
            <!-- 螺旋眼 -->
            <path d="M115,165 m-8,0 a8,8 0 1,1 16,0 a6,6 0 1,0 -12,0 a4,4 0 1,1 8,0" stroke="#2d2d2d" stroke-width="2" fill="none"/>
            <path d="M185,165 m-8,0 a8,8 0 1,1 16,0 a6,6 0 1,0 -12,0 a4,4 0 1,1 8,0" stroke="#2d2d2d" stroke-width="2" fill="none"/>

    <script>
        let score = 0;
        let clicks = [];
        let catState = 'normal'; // normal, bruised, ko, zombie, glitch, chaos, blackhole, matrix, nirvana
        const scoreEl = document.getElementById('score');
        const catClosed = document.getElementById('cat-closed');
        const catOpen = document.getElementById('cat-open');
        const catBruisedClosed = document.getElementById('cat-bruised-closed');
        const catBruisedOpen = document.getElementById('cat-bruised-open');
        const catKoClosed = document.getElementById('cat-ko-closed');
        const catKoOpen = document.getElementById('cat-ko-open');
        const bruiseMsg = document.getElementById('bruise-msg');
        const starsEl = document.getElementById('stars');
        const koFlash = document.getElementById('ko-flash');
        const container = document.getElementById('cat-container');
        const ppsEl = document.getElementById('pps');
        const colorFlash = document.getElementById('color-flash');
        const blackholeOverlay = document.getElementById('blackhole-overlay');
        const matrixCanvas = document.getElementById('matrix-canvas');
        const matrixCtx = matrixCanvas.getContext('2d');
        const haloEl = document.getElementById('halo');
        const catGoldClosed = document.getElementById('cat-gold-closed');
        const catGoldOpen = document.getElementById('cat-gold-open');
        let mouthTimer = null;
        let matrixRunning = false;
        let matrixDrops = [];

        // 隨機工具
        const rand = (min, max) => Math.random() * (max - min) + min;
        const randInt = (min, max) => Math.floor(rand(min, max + 1));
        const pick = arr => arr[Math.floor(Math.random() * arr.length)];

        const catAnimations = ['catSpin', 'catBounce', 'catWobble', 'catJelly', 'catFlipX', 'catFlipY'];
        const emojiSets = {
            zombie: ['💀', '🧟', '☠️', '🦴', '🧠', '👻', '🪦', '⚰️'],
            glitch: ['⚡', '💥', '🔥', '❌', '⚠️', '🔴', '💢', '🌀', '📛', '🆘'],
            chaos: ['💀', '🌈', '🎆', '🎇', '✨', '💫', '🔮', '🎪', '🤯', '👾', '🛸', '🌪️', '☄️', '🃏', '🎭', '💣'],
            blackhole: ['🕳️', '🌑', '🌀', '💫', '☄️', '🌌', '♾️', '⚫'],
            matrix: ['0', '1', '🟩', '💊', '🐈', '🖥️', '⌨️', '📟'],
            nirvana: ['✨', '🌟', '⭐', '💛', '👑', '🏆', '🎆', '🎇', '🌈', '🦋', '🕊️', '💎']
        };
        const msgZombie = ['貓貓變殭屍了...', '腦...漿...', '喵...嗚...不死之身！', '殭屍貓覺醒！'];
        const msgGlitch = ['系̸̢統̶錯̵誤̸', 'E̷R̶R̷O̶R̵ ̷4̶0̷4̵', '貓貓.exe 崩潰了', '現̸實̶裂̵開̸了̵'];
        const msgChaos = ['混沌降臨！', '宇宙在顫抖！', '這不是演習！！', '救命啊啊啊！！', '貓界末日！', '???!!!'];
        const msgBlackhole = ['被黑洞吞噬中...', '時空扭曲！', '事件視界突破！', '重力崩塌！', '喵...的...維度...'];
        const msgMatrix = ['Wake up, Cat...', '紅藥丸還是藍藥丸？', 'There is no spoon', '你看到程式碼了嗎？', 'Follow the white cat'];
        const msgNirvana = ['涅槃重生！', '貓神降臨！', '永恆之光！', '超越一切！', '傳說中的金色貓咪！'];

        // 隨機顏色閃光
        function flashColor() {
            const c = `hsl(${randInt(0,360)}, 100%, 50%)`;
            colorFlash.style.background = c;
            colorFlash.style.opacity = '0.4';
            setTimeout(() => { colorFlash.style.opacity = '0'; }, 150);
        }

        // 噴射 emoji
        function spawnEmoji(set, count) {
            for (let i = 0; i < count; i++) {
                const e = document.createElement('div');
                e.className = 'emoji-float';
                e.textContent = pick(set);
                e.style.left = rand(5, 90) + 'vw';
                e.style.top = rand(-10, 10) + '%';
                e.style.fontSize = rand(20, 60) + 'px';
                e.style.animationDuration = rand(0.8, 2) + 's';
                document.body.appendChild(e);
                setTimeout(() => e.remove(), 2000);
            }
        }

        // 隨機貓咪動畫
        function randomCatAnim(duration) {
            const anim = pick(catAnimations);
            container.style.animation = `${anim} ${duration || 0.5}s ease-in-out`;
            setTimeout(() => { container.style.animation = ''; }, (duration || 0.5) * 1000);
        }

        // 隨機濾鏡
        function randomFilter() {
            const filters = [
                `hue-rotate(${randInt(0,360)}deg)`,
                `saturate(${rand(2,5)})`,
                `brightness(${rand(0.5,2)})`,
                `contrast(${rand(1.5,3)})`,
                `invert(${rand(0.3,1)})`,
                `sepia(${rand(0.5,1)})`,
            ];
            const f = pick(filters);
            container.style.filter = f;
            setTimeout(() => { container.style.filter = ''; }, 300);
        }

        // Glitch 抖動
        function glitchEffect() {
            container.style.animation = `glitchShift 0.3s steps(6) ${randInt(1,3)}`;
            setTimeout(() => { container.style.animation = ''; }, 900);
        }

        // 隨機變大小
        function randomSize() {
            const s = rand(0.5, 1.8);
            container.style.transform = `scale(${s})`;
            setTimeout(() => { container.style.transform = ''; }, 400);
        }

        // 隨機位移
        function randomOffset() {
            const x = rand(-100, 100);
            const y = rand(-50, 50);
            container.style.transform = `translate(${x}px, ${y}px)`;
            setTimeout(() => { container.style.transform = ''; }, 300);
        }

        // 背景隨機色
        function randomBg() {
            document.body.style.background = `hsl(${randInt(0,360)}, ${randInt(30,80)}%, ${randInt(5,20)}%)`;
        }

        // 螢幕震動（隨機強度）
        function randomShake(intensity) {
            const i = intensity || 15;
            document.body.style.transform = `translate(${rand(-i,i)}px, ${rand(-i,i)}px) rotate(${rand(-3,3)}deg)`;
            setTimeout(() => { document.body.style.transform = ''; }, 100);
        }

        // 隨機音效
        function randomSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = pick(['sine', 'square', 'sawtooth', 'triangle']);
            osc.frequency.setValueAtTime(rand(50, 2000), audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(rand(20, 800), audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.15);
        }

        // === 1000: 殭屍模式 - 每次點擊隨機 1~2 個效果 ===
        function zombieEffects() {
            const effects = [
                () => spawnEmoji(emojiSets.zombie, randInt(1, 3)),
                () => randomCatAnim(0.4),
                () => randomFilter(),
                () => flashColor(),
                () => randomShake(10),
                () => randomSound(),
            ];
            const count = randInt(1, 2);
            for (let i = 0; i < count; i++) pick(effects)();
        }

        // === 1500: 故障模式 - 每次點擊隨機 2~3 個效果 ===
        function glitchEffects() {
            const effects = [
                () => spawnEmoji(emojiSets.glitch, randInt(2, 5)),
                () => glitchEffect(),
                () => randomFilter(),
                () => randomCatAnim(0.3),
                () => flashColor(),
                () => randomShake(20),
                () => randomBg(),
                () => randomSize(),
                () => randomSound(),
                () => { scoreEl.style.transform = `rotate(${rand(-30,30)}deg) scale(${rand(0.8,1.5)})`; setTimeout(() => { scoreEl.style.transform = ''; }, 300); },
            ];
            const count = randInt(2, 3);
            for (let i = 0; i < count; i++) pick(effects)();
        }

        // === 2000+: 混沌模式 - 每次點擊隨機 3~6 個效果，全開 ===
        function chaosEffects() {
            const effects = [
                () => spawnEmoji(emojiSets.chaos, randInt(3, 8)),
                () => glitchEffect(),
                () => randomFilter(),
                () => randomCatAnim(rand(0.2, 0.6)),
                () => flashColor(),
                () => randomShake(30),
                () => randomBg(),
                () => randomSize(),
                () => randomOffset(),
                () => randomSound(),
                () => { scoreEl.style.transform = `rotate(${rand(-45,45)}deg) scale(${rand(0.5,2)})`; setTimeout(() => { scoreEl.style.transform = ''; }, 400); },
                () => { scoreEl.style.color = `hsl(${randInt(0,360)}, 100%, 60%)`; },
                () => { bruiseMsg.textContent = pick(msgChaos); bruiseMsg.style.color = `hsl(${randInt(0,360)}, 100%, 60%)`; },
                () => { document.body.style.filter = `hue-rotate(${randInt(0,360)}deg)`; setTimeout(() => { document.body.style.filter = ''; }, 200); },
                () => { container.style.transform = `rotate(${rand(-180,180)}deg) scale(${rand(0.3,2)})`; setTimeout(() => { container.style.transform = ''; }, 500); },
            ];
            const count = randInt(3, 6);
            for (let i = 0; i < count; i++) pick(effects)();
        }

        // === 2500: 黑洞模式 ===
        function vortexParticles() {
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            for (let i = 0; i < randInt(3, 6); i++) {
                const p = document.createElement('div');
                p.className = 'vortex-particle';
                const angle = rand(0, Math.PI * 2);
                const dist = rand(100, 400);
                const sx = cx + Math.cos(angle) * dist;
                const sy = cy + Math.sin(angle) * dist;
                p.style.left = sx + 'px';
                p.style.top = sy + 'px';
                p.style.background = pick(['#8b5cf6', '#6d28d9', '#4c1d95', '#7c3aed', '#a78bfa', '#fff']);
                p.style.setProperty('--ex', (cx - sx) + 'px');
                p.style.setProperty('--ey', (cy - sy) + 'px');
                p.style.animationDuration = rand(0.5, 1.5) + 's';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 1500);
            }
        }

        function blackholeEffects() {
            const effects = [
                () => vortexParticles(),
                () => spawnEmoji(emojiSets.blackhole, randInt(1, 4)),
                () => { container.style.animation = `suckIn ${rand(0.3,0.8)}s ease-in-out`; setTimeout(() => { container.style.animation = ''; }, 800); },
                () => randomShake(25),
                () => { document.body.style.filter = `brightness(${rand(0.2,0.6)}) contrast(${rand(1.5,3)})`; setTimeout(() => { document.body.style.filter = ''; }, 200); },
                () => randomSound(),
                () => { const s = rand(0.3, 1.5); container.style.transform = `scale(${s}) rotate(${rand(-90,90)}deg)`; setTimeout(() => { container.style.transform = ''; }, 400); },
                () => { bruiseMsg.textContent = pick(msgBlackhole); },
            ];
            const count = randInt(2, 4);
            for (let i = 0; i < count; i++) pick(effects)();
        }

        // === 3000: 矩陣模式 ===
        function startMatrix() {
            if (matrixRunning) return;
            matrixRunning = true;
            matrixCanvas.width = window.innerWidth;
            matrixCanvas.height = window.innerHeight;
            matrixCanvas.style.opacity = '0.4';
            const cols = Math.floor(matrixCanvas.width / 14);
            matrixDrops = Array(cols).fill(1);

            function drawMatrix() {
                if (!matrixRunning) return;
                matrixCtx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                matrixCtx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);
                matrixCtx.fillStyle = '#0f0';
                matrixCtx.font = '14px monospace';
                for (let i = 0; i < matrixDrops.length; i++) {
                    const text = String.fromCharCode(0x30A0 + Math.random() * 96);
                    matrixCtx.fillStyle = Math.random() > 0.9 ? '#fff' : `hsl(120, 100%, ${rand(40,70)}%)`;
                    matrixCtx.fillText(text, i * 14, matrixDrops[i] * 14);
                    if (matrixDrops[i] * 14 > matrixCanvas.height && Math.random() > 0.975) matrixDrops[i] = 0;
                    matrixDrops[i]++;
                }
                requestAnimationFrame(drawMatrix);
            }
            drawMatrix();
        }

        function matrixEffects() {
            const effects = [
                () => spawnEmoji(emojiSets.matrix, randInt(2, 5)),
                () => glitchEffect(),
                () => randomCatAnim(0.3),
                () => { container.style.filter = `brightness(${rand(0.5,2)}) hue-rotate(${randInt(100,140)}deg)`; setTimeout(() => { container.style.filter = ''; }, 300); },
                () => randomShake(15),
                () => randomSound(),
                () => { scoreEl.style.color = `hsl(120, 100%, ${randInt(40,70)}%)`; },
                () => { bruiseMsg.textContent = pick(msgMatrix); },
                () => { document.body.style.filter = `hue-rotate(${randInt(100,140)}deg) brightness(${rand(0.7,1.5)})`; setTimeout(() => { document.body.style.filter = ''; }, 200); },
            ];
            const count = randInt(2, 3);
            for (let i = 0; i < count; i++) pick(effects)();
        }

        // === 5000: 涅槃模式 ===
        function spawnFirework(x, y) {
            const fw = document.createElement('div');
            fw.className = 'firework';
            fw.style.left = x + 'px';
            fw.style.top = y + 'px';
            const colors = ['#ffd700', '#ff6b6b', '#48dbfb', '#ff9ff3', '#fff', '#ffa500', '#ff4757'];
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'firework-particle';
                p.style.background = pick(colors);
                const angle = (i / 20) * Math.PI * 2;
                const dist = rand(40, 120);
                p.style.setProperty('--fx', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--fy', Math.sin(angle) * dist + 'px');
                fw.appendChild(p);
            }
            document.body.appendChild(fw);
            setTimeout(() => fw.remove(), 1000);
        }

        function nirvanaEffects() {
            const effects = [
                () => spawnEmoji(emojiSets.nirvana, randInt(2, 5)),
                () => spawnFirework(rand(50, window.innerWidth - 50), rand(50, window.innerHeight - 50)),
                () => { container.style.animation = `nirvanaGlow 1s ease-in-out`; setTimeout(() => { container.style.animation = ''; }, 1000); },
                () => randomCatAnim(0.5),
                () => { document.body.style.filter = `brightness(${rand(1,2)}) saturate(${rand(1,2)})`; setTimeout(() => { document.body.style.filter = ''; }, 300); },
                () => { scoreEl.style.textShadow = `0 0 ${randInt(10,40)}px #ffd700, 0 0 ${randInt(40,80)}px rgba(255,215,0,0.5)`; },
                () => { bruiseMsg.textContent = pick(msgNirvana); },
                () => { flashColor(); },
                () => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.type = 'sine';
                    const notes = [523, 659, 784, 1047];
                    osc.frequency.setValueAtTime(pick(notes), audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    osc.start(audioCtx.currentTime);
                    osc.stop(audioCtx.currentTime + 0.3);
                },
            ];
            const count = randInt(2, 4);
            for (let i = 0; i < count; i++) pick(effects)();
        }

        // 音效
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playPop() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(600 + Math.random() * 200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function popCat(e) {
            e.preventDefault();
            score++;
            scoreEl.textContent = score;

            // 狀態切換
            if (score === 100 && catState === 'normal') {
                catState = 'bruised';
                bruiseMsg.textContent = '喵嗚！貓貓被打瘀青了！';
                bruiseMsg.style.display = 'block';
                document.body.style.background = '#1a1025';
            }
            if (score === 500 && catState === 'bruised') {
                catState = 'ko';
                koFlash.style.opacity = '1';
                setTimeout(() => { koFlash.style.opacity = '0'; }, 150);
                document.body.classList.add('screen-shake');
                setTimeout(() => document.body.classList.remove('screen-shake'), 600);
                starsEl.style.display = 'block';
                bruiseMsg.textContent = '貓貓被打趴了！！！KO！！！';
                bruiseMsg.style.color = '#ff4757';
                bruiseMsg.style.fontSize = '30px';
                bruiseMsg.style.textShadow = '0 0 20px rgba(255, 71, 87, 0.8)';
                bruiseMsg.style.display = 'block';
                bruiseMsg.style.animation = 'none';
                void bruiseMsg.offsetWidth;
                bruiseMsg.style.animation = 'shake 0.5s ease-in-out';
                document.body.style.background = '#0d0515';
                scoreEl.style.color = '#ff4757';
                scoreEl.style.textShadow = '0 0 20px rgba(255, 71, 87, 0.8)';
            }
            if (score === 1000 && catState === 'ko') {
                catState = 'zombie';
                koFlash.style.background = '#00ff00';
                koFlash.style.opacity = '1';
                setTimeout(() => { koFlash.style.opacity = '0'; koFlash.style.background = '#fff'; }, 200);
                document.body.classList.add('screen-shake');
                setTimeout(() => document.body.classList.remove('screen-shake'), 600);
                bruiseMsg.textContent = pick(msgZombie);
                bruiseMsg.style.color = '#00ff41';
                bruiseMsg.style.fontSize = '28px';
                bruiseMsg.style.textShadow = '0 0 20px rgba(0, 255, 65, 0.8)';
                document.body.style.background = '#0a1a0a';
                scoreEl.style.color = '#00ff41';
                scoreEl.style.textShadow = '0 0 20px rgba(0, 255, 65, 0.8)';
                spawnEmoji(emojiSets.zombie, 10);
            }
            if (score === 1500 && catState === 'zombie') {
                catState = 'glitch';
                koFlash.style.background = '#ff0000';
                koFlash.style.opacity = '1';
                setTimeout(() => { koFlash.style.opacity = '0'; setTimeout(() => { koFlash.style.opacity = '0.8'; setTimeout(() => { koFlash.style.opacity = '0'; koFlash.style.background = '#fff'; }, 80); }, 80); }, 100);
                document.body.classList.add('screen-shake');
                setTimeout(() => document.body.classList.remove('screen-shake'), 800);
                bruiseMsg.textContent = pick(msgGlitch);
                bruiseMsg.style.color = '#ff0040';
                bruiseMsg.style.fontSize = '32px';
                bruiseMsg.style.textShadow = '0 0 25px rgba(255, 0, 64, 0.9), 3px 0 #0ff, -3px 0 #f0f';
                document.body.style.background = '#0a0010';
                scoreEl.style.color = '#ff0040';
                scoreEl.style.textShadow = '0 0 20px rgba(255, 0, 64, 0.8), 2px 0 #0ff, -2px 0 #f0f';
                spawnEmoji(emojiSets.glitch, 15);
            }
            if (score === 2000 && catState === 'glitch') {
                catState = 'chaos';
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        koFlash.style.background = `hsl(${randInt(0,360)}, 100%, 50%)`;
                        koFlash.style.opacity = '0.8';
                        setTimeout(() => { koFlash.style.opacity = '0'; }, 80);
                    }, i * 120);
                }
                document.body.classList.add('screen-shake');
                setTimeout(() => document.body.classList.remove('screen-shake'), 1000);
                bruiseMsg.textContent = pick(msgChaos);
                bruiseMsg.style.color = '#fff';
                bruiseMsg.style.fontSize = '36px';
                bruiseMsg.style.textShadow = '0 0 30px #fff, 0 0 60px #f0f, 0 0 90px #0ff';
                document.body.style.background = '#000';
                spawnEmoji(emojiSets.chaos, 25);
            }

            if (score === 2500 && catState === 'chaos') {
                catState = 'blackhole';
                blackholeOverlay.style.opacity = '1';
                koFlash.style.background = '#000';
                koFlash.style.opacity = '1';
                setTimeout(() => { koFlash.style.opacity = '0'; koFlash.style.background = '#fff'; }, 500);
                document.body.classList.add('screen-shake');
                setTimeout(() => document.body.classList.remove('screen-shake'), 1000);
                bruiseMsg.textContent = pick(msgBlackhole);
                bruiseMsg.style.color = '#a78bfa';
                bruiseMsg.style.fontSize = '30px';
                bruiseMsg.style.textShadow = '0 0 25px rgba(167, 139, 250, 0.9), 0 0 50px rgba(109, 40, 217, 0.5)';
                document.body.style.background = '#05000d';
                scoreEl.style.color = '#a78bfa';
                scoreEl.style.textShadow = '0 0 20px rgba(167, 139, 250, 0.8)';
                starsEl.style.display = 'none';
                vortexParticles();
                spawnEmoji(emojiSets.blackhole, 15);
            }
            if (score === 3000 && catState === 'blackhole') {
                catState = 'matrix';
                blackholeOverlay.style.opacity = '0';
                startMatrix();
                koFlash.style.background = '#00ff00';
                koFlash.style.opacity = '0.8';
                setTimeout(() => { koFlash.style.opacity = '0'; koFlash.style.background = '#fff'; }, 200);
                document.body.classList.add('screen-shake');
                setTimeout(() => document.body.classList.remove('screen-shake'), 600);
                bruiseMsg.textContent = pick(msgMatrix);
                bruiseMsg.style.color = '#00ff41';
                bruiseMsg.style.fontSize = '28px';
                bruiseMsg.style.textShadow = '0 0 20px rgba(0, 255, 65, 0.8), 0 0 40px rgba(0, 255, 0, 0.3)';
                bruiseMsg.style.fontFamily = 'monospace';
                document.body.style.background = '#000800';
                scoreEl.style.color = '#00ff41';
                scoreEl.style.fontFamily = 'monospace';
                scoreEl.style.textShadow = '0 0 15px rgba(0, 255, 65, 0.8)';
                spawnEmoji(emojiSets.matrix, 20);
            }
            if (score === 5000 && catState === 'matrix') {
                catState = 'nirvana';
                // 停掉矩陣
                matrixRunning = false;
                matrixCanvas.style.opacity = '0';
                // 大量煙火
                for (let i = 0; i < 10; i++) {
                    setTimeout(() => spawnFirework(rand(50, window.innerWidth - 50), rand(50, window.innerHeight - 50)), i * 200);
                }
                // 金色閃光
                koFlash.style.background = '#ffd700';
                koFlash.style.opacity = '1';
                setTimeout(() => { koFlash.style.opacity = '0.5'; setTimeout(() => { koFlash.style.opacity = '0'; koFlash.style.background = '#fff'; }, 300); }, 300);
                document.body.classList.add('screen-shake');
                setTimeout(() => document.body.classList.remove('screen-shake'), 1000);
                // 光環
                haloEl.style.display = 'block';
                starsEl.style.display = 'none';
                bruiseMsg.textContent = pick(msgNirvana);
                bruiseMsg.style.color = '#ffd700';
                bruiseMsg.style.fontSize = '36px';
                bruiseMsg.style.fontFamily = 'Arial, sans-serif';
                bruiseMsg.style.textShadow = '0 0 30px #ffd700, 0 0 60px rgba(255, 215, 0, 0.5), 0 0 90px rgba(255, 165, 0, 0.3)';
                document.body.style.background = '#1a0f00';
                scoreEl.style.color = '#ffd700';
                scoreEl.style.fontFamily = 'Arial, sans-serif';
                scoreEl.style.textShadow = '0 0 20px #ffd700, 0 0 40px rgba(255, 215, 0, 0.5)';
                spawnEmoji(emojiSets.nirvana, 30);
            }

            // 隨機效果觸發
            if (catState === 'zombie') zombieEffects();
            if (catState === 'glitch') glitchEffects();
            if (catState === 'chaos') chaosEffects();
            if (catState === 'blackhole') blackholeEffects();
            if (catState === 'matrix') matrixEffects();
            if (catState === 'nirvana') nirvanaEffects();

            // 分數彈跳效果
            scoreEl.classList.remove('pop');
            void scoreEl.offsetWidth;
            scoreEl.classList.add('pop');

            // 選擇對應的貓
            let closedSvg, openSvg;
            if (catState === 'nirvana') { closedSvg = catGoldClosed; openSvg = catGoldOpen; }
            else if (['ko', 'zombie', 'glitch', 'chaos', 'blackhole', 'matrix'].includes(catState)) { closedSvg = catKoClosed; openSvg = catKoOpen; }
            else if (catState === 'bruised') { closedSvg = catBruisedClosed; openSvg = catBruisedOpen; }
            else { closedSvg = catClosed; openSvg = catOpen; }

            // 隱藏所有
            catClosed.style.display = 'none';
            catOpen.style.display = 'none';
            catBruisedClosed.style.display = 'none';
            catBruisedOpen.style.display = 'none';
            catKoClosed.style.display = 'none';
            catKoOpen.style.display = 'none';
            catGoldClosed.style.display = 'none';
            catGoldOpen.style.display = 'none';

            openSvg.style.display = 'block';
            clearTimeout(mouthTimer);
            mouthTimer = setTimeout(() => {
                openSvg.style.display = 'none';
                closedSvg.style.display = 'block';
            }, 120);

            // 音效
            playPop();
            if (['ko', 'zombie', 'glitch', 'chaos', 'blackhole', 'matrix'].includes(catState)) {
                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.frequency.setValueAtTime(80 + Math.random() * 40, audioCtx.currentTime);
                osc2.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.2);
                gain2.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc2.start(audioCtx.currentTime);
                osc2.stop(audioCtx.currentTime + 0.2);
            }

            // +1 浮動文字
            const popText = document.createElement('div');
            popText.className = 'pop-text';
            popText.textContent = '+1';
            popText.style.left = (Math.random() * 200 + 50) + 'px';
            popText.style.top = (Math.random() * 100 + 50) + 'px';
            container.appendChild(popText);
            setTimeout(() => popText.remove(), 800);

            // 粒子特效
            let colors, particleCount;
            if (catState === 'nirvana') {
                colors = ['#ffd700', '#fff4a3', '#ffa500', '#fff', '#ffec8b', '#ffe066'];
                particleCount = 15;
            } else if (catState === 'matrix') {
                colors = ['#00ff41', '#008f11', '#003b00', '#00ff00', '#fff'];
                particleCount = 12;
            } else if (catState === 'blackhole') {
                colors = ['#8b5cf6', '#6d28d9', '#4c1d95', '#a78bfa', '#fff'];
                particleCount = 15;
            } else if (catState === 'chaos') {
                colors = Array.from({length: 8}, () => `hsl(${randInt(0,360)}, 100%, 60%)`);
                particleCount = 20;
            } else if (catState === 'glitch') {
                colors = ['#ff0040', '#00ffff', '#ff00ff', '#fff', '#000'];
                particleCount = 15;
            } else if (catState === 'zombie') {
                colors = ['#00ff41', '#39ff14', '#32cd32', '#228b22', '#adff2f'];
                particleCount = 10;
            } else if (catState === 'ko') {
                colors = ['#ff4757', '#8b0000', '#5a3d7a', '#48dbfb', '#fff'];
                particleCount = 12;
            } else {
                colors = ['#ff6b6b', '#ffe66d', '#48dbfb', '#ff9ff3', '#54a0ff'];
                particleCount = 6;
            }
            for (let i = 0; i < particleCount; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.left = '150px';
                p.style.top = '150px';
                const angle = Math.random() * Math.PI * 2;
                const dist = 50 + Math.random() * 80;
                p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
                container.appendChild(p);
                setTimeout(() => p.remove(), 600);
            }

            // PPS 計算
            const now = Date.now();
            clicks.push(now);
            clicks = clicks.filter(t => now - t < 1000);
        }

        // 更新 PPS
        setInterval(() => {
            const now = Date.now();
            clicks = clicks.filter(t => now - t < 1000);
            ppsEl.textContent = '每秒點擊: ' + clicks.length;
        }, 200);
    </script>
</body>
</html>
