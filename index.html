<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Fight!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
        }

        h1 {
            color: #ff4757;
            font-size: 42px;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(255, 71, 87, 0.8);
        }

        /* HP 血條 */
        #hp-section {
            width: 320px;
            margin-bottom: 8px;
            text-align: center;
        }

        #hp-label {
            color: #ff4757;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        #hp-bar-outer {
            width: 100%;
            height: 24px;
            background: #333;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #555;
            position: relative;
        }

        #hp-bar-inner {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #ff4757, #ff6b81);
            border-radius: 10px;
            transition: width 0.15s ease-out;
            position: relative;
        }

        #hp-bar-inner::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 4px;
            right: 4px;
            height: 6px;
            background: rgba(255,255,255,0.25);
            border-radius: 4px;
        }

        #hp-text {
            color: #fff;
            font-size: 13px;
            margin-top: 3px;
        }

        /* 傷害數字 */
        #damage-display {
            color: #ffe66d;
            font-size: 24px;
            font-weight: bold;
            height: 30px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 230, 109, 0.6);
        }

        #boss-container {
            position: relative;
            cursor: pointer;
            transition: transform 0.05s;
        }

        #boss-container:active {
            transform: scale(0.95);
        }

        .boss-svg {
            width: 300px;
            height: 300px;
        }

        /* 點擊特效 */
        .dmg-text {
            position: absolute;
            color: #ffe66d;
            font-size: 28px;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            text-shadow: 0 0 10px rgba(255, 230, 109, 0.8);
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            animation: particleBurst 0.6s ease-out forwards;
        }

        @keyframes particleBurst {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
        }

        #phase-msg {
            color: #ff6b6b;
            font-size: 24px;
            font-weight: bold;
            margin-top: 10px;
            text-shadow: 0 0 15px rgba(255, 107, 107, 0.6);
            display: none;
            animation: shake 0.5s ease-in-out;
            min-height: 32px;
        }

        #combo {
            color: #aaa;
            font-size: 16px;
            margin-top: 5px;
        }

        #instructions {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }

        .screen-shake { animation: bigShake 0.6s ease-in-out; }

        @keyframes bigShake {
            0%, 100% { transform: translate(0,0) rotate(0); }
            10% { transform: translate(-15px,-10px) rotate(-2deg); }
            20% { transform: translate(15px,10px) rotate(2deg); }
            30% { transform: translate(-10px,5px) rotate(-1deg); }
            50% { transform: translate(-5px,10px) rotate(-2deg); }
            70% { transform: translate(-15px,5px) rotate(-1deg); }
            90% { transform: translate(-5px,-5px) rotate(0); }
        }

        .emoji-float {
            position: fixed;
            font-size: 40px;
            pointer-events: none;
            z-index: 998;
            animation: emojiDrop 1.5s ease-in forwards;
        }

        @keyframes emojiDrop {
            0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
            100% { opacity: 0; transform: translateY(100vh) rotate(720deg) scale(0.3); }
        }

        @keyframes catSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes catBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-60px); } }
        @keyframes catWobble { 0% { transform: rotate(0) scale(1); } 25% { transform: rotate(-15deg) scale(1.1); } 50% { transform: rotate(15deg) scale(0.9); } 75% { transform: rotate(-10deg) scale(1.05); } 100% { transform: rotate(0) scale(1); } }
        @keyframes catJelly { 0% { transform: scaleX(1) scaleY(1); } 25% { transform: scaleX(1.3) scaleY(0.7); } 50% { transform: scaleX(0.7) scaleY(1.3); } 75% { transform: scaleX(1.15) scaleY(0.85); } 100% { transform: scaleX(1) scaleY(1); } }
        @keyframes catFlipX { 0% { transform: perspective(400px) rotateY(0); } 100% { transform: perspective(400px) rotateY(360deg); } }
        @keyframes catFlipY { 0% { transform: perspective(400px) rotateX(0); } 100% { transform: perspective(400px) rotateX(360deg); } }

        @keyframes glitchShift {
            0% { clip-path: inset(0 0 90% 0); transform: translateX(-10px); }
            20% { clip-path: inset(30% 0 50% 0); transform: translateX(10px); }
            40% { clip-path: inset(60% 0 20% 0); transform: translateX(-5px); }
            60% { clip-path: inset(10% 0 70% 0); transform: translateX(5px); }
            80% { clip-path: inset(80% 0 5% 0); transform: translateX(-10px); }
            100% { clip-path: inset(0); transform: translateX(0); }
        }

        @keyframes suckIn {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(0.3) rotate(360deg); filter: blur(2px); }
            100% { transform: scale(1) rotate(720deg); }
        }

        .vortex-particle {
            position: fixed;
            width: 4px; height: 4px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 997;
            animation: spiralIn 1.5s ease-in forwards;
        }

        @keyframes spiralIn {
            0% { opacity: 1; }
            100% { opacity: 0; transform: translate(var(--ex), var(--ey)) scale(0); }
        }

        #ko-flash {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 999;
            transition: opacity 0.1s;
        }

        .screen-flash-color {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 997;
            opacity: 0;
            transition: opacity 0.15s;
        }

        #blackhole-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 996;
            opacity: 0;
            background: radial-gradient(circle at 50% 50%, transparent 0%, transparent 20%, rgba(0,0,0,0.8) 60%, #000 100%);
            transition: opacity 0.5s;
        }

        #matrix-canvas {
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 995;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .firework { position: fixed; pointer-events: none; z-index: 998; }

        .firework-particle {
            position: absolute;
            width: 4px; height: 4px;
            border-radius: 50%;
            animation: fireworkBurst 1s ease-out forwards;
        }

        @keyframes fireworkBurst {
            0% { opacity: 1; transform: translate(0,0) scale(1); }
            100% { opacity: 0; transform: translate(var(--fx), var(--fy)) scale(0); }
        }

        /* 勝利皇冠 */
        .crown {
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 50px;
            animation: crownFloat 2s ease-in-out infinite alternate;
            pointer-events: none;
            display: none;
        }

        @keyframes crownFloat {
            0% { transform: translateX(-50%) translateY(0); }
            100% { transform: translateX(-50%) translateY(-10px); }
        }

        @keyframes victoryGlow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(255,215,0,0.5)); }
            50% { filter: drop-shadow(0 0 30px rgba(255,215,0,0.9)) drop-shadow(0 0 60px rgba(255,215,0,0.3)); }
        }
    </style>
</head>
<body>
    <div id="ko-flash"></div>
    <div id="color-flash" class="screen-flash-color"></div>
    <div id="blackhole-overlay"></div>
    <canvas id="matrix-canvas"></canvas>

    <h1>BOSS FIGHT!</h1>
    <div id="hp-section">
        <div id="hp-label">BOSS HP</div>
        <div id="hp-bar-outer">
            <div id="hp-bar-inner"></div>
        </div>
        <div id="hp-text">10000 / 10000</div>
    </div>
    <div id="damage-display"></div>

    <div id="boss-container" onmousedown="hitBoss(event)" ontouchstart="hitBoss(event)">
        <!-- Boss 正常 -->
        <svg id="boss-normal" class="boss-svg" viewBox="0 0 300 300">
            <!-- 角 -->
            <polygon points="85,110 70,40 110,95" fill="#8b0000"/>
            <polygon points="215,110 230,40 190,95" fill="#8b0000"/>
            <!-- 頭 -->
            <ellipse cx="150" cy="175" rx="105" ry="95" fill="#c0392b"/>
            <!-- 臉 -->
            <ellipse cx="150" cy="185" rx="80" ry="70" fill="#e74c3c"/>
            <!-- 眉毛 -->
            <line x1="90" y1="148" x2="125" y2="155" stroke="#2d2d2d" stroke-width="4" stroke-linecap="round"/>
            <line x1="210" y1="148" x2="175" y2="155" stroke="#2d2d2d" stroke-width="4" stroke-linecap="round"/>
            <!-- 眼睛 -->
            <ellipse cx="115" cy="170" rx="16" ry="18" fill="#fff"/>
            <ellipse cx="185" cy="170" rx="16" ry="18" fill="#fff"/>
            <ellipse cx="115" cy="170" rx="9" ry="11" fill="#ff0000"/>
            <ellipse cx="185" cy="170" rx="9" ry="11" fill="#ff0000"/>
            <circle cx="110" cy="166" r="4" fill="#fff"/>
            <circle cx="180" cy="166" r="4" fill="#fff"/>

            <ellipse cx="150" cy="198" rx="7" ry="5" fill="#a93226"/>

            <line x1="170" y1="150" x2="200" y2="175" stroke="#a93226" stroke-width="2"/>
            <line x1="180" y1="150" x2="195" y2="170" stroke="#a93226" stroke-width="2"/>
        </svg>

        <!-- Boss 受傷（張嘴吼） -->
        <svg id="boss-hit" class="boss-svg" viewBox="0 0 300 300" style="display:none;">
            <polygon points="85,110 70,40 110,95" fill="#8b0000"/>
            <polygon points="215,110 230,40 190,95" fill="#8b0000"/>
            <ellipse cx="150" cy="175" rx="105" ry="95" fill="#c0392b"/>
            <ellipse cx="150" cy="185" rx="80" ry="70" fill="#e74c3c"/>
            <!-- 眉毛（更怒） -->
            <line x1="85" y1="143" x2="125" y2="155" stroke="#2d2d2d" stroke-width="5" stroke-linecap="round"/>
            <line x1="215" y1="143" x2="175" y2="155" stroke="#2d2d2d" stroke-width="5" stroke-linecap="round"/>
            <!-- 眼睛（瞇起來） -->
            <ellipse cx="115" cy="168" rx="18" ry="14" fill="#fff"/>
            <ellipse cx="185" cy="168" rx="18" ry="14" fill="#fff"/>
            <ellipse cx="115" cy="168" rx="11" ry="9" fill="#ff0000"/>
            <ellipse cx="185" cy="168" rx="11" ry="9" fill="#ff0000"/>
            <circle cx="110" cy="164" r="3" fill="#fff"/>
            <circle cx="180" cy="164" r="3" fill="#fff"/>
            <ellipse cx="150" cy="198" rx="7" ry="5" fill="#a93226"/>
            <!-- 張嘴吼叫 -->
            <ellipse cx="150" cy="225" rx="32" ry="24" fill="#2d2d2d"/>
            <ellipse cx="150" cy="220" rx="26" ry="14" fill="#8b0000"/>
            <!-- 尖牙 -->
            <polygon points="130,210 136,225 124,225" fill="#fff"/>
            <polygon points="170,210 176,225 164,225" fill="#fff"/>
            <polygon points="145,232 150,245 155,232" fill="#fff"/>
            <line x1="170" y1="150" x2="200" y2="175" stroke="#a93226" stroke-width="2"/>
            <line x1="180" y1="150" x2="195" y2="170" stroke="#a93226" stroke-width="2"/>
        </svg>

        <!-- Boss 瀕死 -->
        <svg id="boss-dying" class="boss-svg" viewBox="0 0 300 300" style="display:none;">
            <!-- 斷角 -->
            <polygon points="85,110 75,55 110,95" fill="#5a0000"/>
            <polygon points="215,110 225,65 190,95" fill="#5a0000"/>
            <polygon points="220,50 230,40 225,65" fill="#1a1a2e"/>
            <ellipse cx="150" cy="175" rx="105" ry="95" fill="#7b241c"/>
            <ellipse cx="150" cy="185" rx="80" ry="70" fill="#a93226"/>
            <!-- 瘀青 -->
            <ellipse cx="110" cy="175" rx="25" ry="18" fill="#4a0e0e" opacity="0.5"/>
            <ellipse cx="195" cy="170" rx="20" ry="15" fill="#3d0808" opacity="0.4"/>
            <!-- X 眼 -->
            <line x1="105" y1="160" x2="125" y2="180" stroke="#2d2d2d" stroke-width="4" stroke-linecap="round"/>
            <line x1="125" y1="160" x2="105" y2="180" stroke="#2d2d2d" stroke-width="4" stroke-linecap="round"/>
            <line x1="175" y1="160" x2="195" y2="180" stroke="#2d2d2d" stroke-width="4" stroke-linecap="round"/>
            <line x1="195" y1="160" x2="175" y2="180" stroke="#2d2d2d" stroke-width="4" stroke-linecap="round"/>
            <ellipse cx="150" cy="198" rx="7" ry="5" fill="#6b1a1a"/>
            <!-- 張嘴哀嚎 -->
            <ellipse cx="150" cy="225" rx="30" ry="22" fill="#2d2d2d"/>
            <ellipse cx="150" cy="220" rx="24" ry="12" fill="#8b0000"/>
            <!-- 斷牙 -->
            <rect x="138" y="210" width="7" height="7" rx="1" fill="#fff"/>
            <rect x="158" y="210" width="7" height="7" rx="1" fill="#fff"/>
            <!-- 裂痕 -->
            <line x1="130" y1="130" x2="140" y2="160" stroke="#4a0e0e" stroke-width="2"/>
            <line x1="135" y1="140" x2="145" y2="150" stroke="#4a0e0e" stroke-width="2"/>
            <line x1="170" y1="140" x2="200" y2="175" stroke="#4a0e0e" stroke-width="3"/>
            <line x1="180" y1="140" x2="195" y2="165" stroke="#4a0e0e" stroke-width="2"/>
            <!-- OK繃 -->
            <rect x="170" y="140" width="35" height="16" rx="4" fill="#f5deb3" transform="rotate(-20, 187, 148)"/>
            <rect x="90" y="150" width="30" height="14" rx="4" fill="#f5deb3" transform="rotate(15, 105, 157)"/>
        </svg>

        <!-- Boss 死亡 -->
        <svg id="boss-dead" class="boss-svg" viewBox="0 0 300 300" style="display:none;">
            <polygon points="85,115 80,70 110,100" fill="#3d1111"/>
            <polygon points="215,115 220,80 190,100" fill="#3d1111"/>
            <polygon points="216,60 230,40 220,80" fill="#1a1a2e"/>
            <polygon points="80,55 70,40 80,70" fill="#1a1a2e"/>
            <ellipse cx="150" cy="175" rx="105" ry="95" fill="#4a1a1a"/>
            <ellipse cx="150" cy="185" rx="80" ry="70" fill="#6b2a2a"/>
            <!-- 大片瘀傷 -->
            <ellipse cx="110" cy="175" rx="28" ry="20" fill="#2d0a0a" opacity="0.6"/>
            <ellipse cx="195" cy="168" rx="25" ry="18" fill="#1f0505" opacity="0.5"/>
            <circle cx="160" cy="210" r="15" fill="#2d0a0a" opacity="0.4"/>
            <!-- 螺旋眼 -->
            <path d="M115,170 m-10,0 a10,10 0 1,1 20,0 a7,7 0 1,0 -14,0 a4,4 0 1,1 8,0" stroke="#2d2d2d" stroke-width="2.5" fill="none"/>
            <path d="M185,170 m-10,0 a10,10 0 1,1 20,0 a7,7 0 1,0 -14,0 a4,4 0 1,1 8,0" stroke="#2d2d2d" stroke-width="2.5" fill="none"/>
            <!-- 嘴（委屈） -->
            <path d="M 125 220 Q 150 208 175 220" stroke="#2d2d2d" stroke-width="3" fill="none" stroke-linecap="round"/>
            <!-- 很多裂痕 -->
            <line x1="120" y1="125" x2="135" y2="155" stroke="#2d0a0a" stroke-width="2.5"/>
            <line x1="170" y1="130" x2="200" y2="175" stroke="#2d0a0a" stroke-width="3"/>
            <line x1="100" y1="200" x2="120" y2="220" stroke="#2d0a0a" stroke-width="2"/>

            <rect x="170" y="135" width="35" height="16" rx="4" fill="#f5deb3" transform="rotate(-20, 187, 143)"/>
            <rect x="85" y="148" width="30" height="14" rx="4" fill="#f5deb3" transform="rotate(15, 100, 155)"/>
            <rect x="130" y="105" width="32" height="14" rx="4" fill="#f5deb3" transform="rotate(-5, 146, 112)"/>
        </svg>

        <!-- 勝利 Boss（金色灰燼） -->
        <svg id="boss-victory" class="boss-svg" viewBox="0 0 300 300" style="display:none;">
            <defs><linearGradient id="goldG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#ffd700"/><stop offset="50%" style="stop-color:#fff4a3"/><stop offset="100%" style="stop-color:#ffa500"/></linearGradient></defs>
            <!-- 獎盃 -->
            <rect x="125" y="220" width="50" height="15" rx="3" fill="#b8860b"/>
            <rect x="135" y="195" width="30" height="30" rx="2" fill="#daa520"/>
            <ellipse cx="150" cy="175" rx="55" ry="50" fill="url(#goldG)"/>
            <ellipse cx="150" cy="165" rx="40" ry="35" fill="#fff4a3"/>
            <!-- 星星 -->
            <polygon points="150,140 156,155 172,155 159,165 164,180 150,170 136,180 141,165 128,155 144,155" fill="#ffa500"/>

            <path d="M 95 160 Q 80 160 80 180 Q 80 200 100 195" stroke="#daa520" stroke-width="6" fill="none"/>
            <path d="M 205 160 Q 220 160 220 180 Q 220 200 200 195" stroke="#daa520" stroke-width="6" fill="none"/>
            <!-- VICTORY -->
            <text x="150" y="265" text-anchor="middle" fill="#ffd700" font-size="22" font-weight="bold">VICTORY!</text>
        </svg>

        <div class="crown" id="crown">👑</div>
    </div>

    <div id="phase-msg"></div>
    <div id="combo"><span id="pps">每秒攻擊: 0</span></div>
    <div id="instructions">瘋狂點擊打倒 Boss！</div>

    <script>
        const BOSS_MAX_HP = 10000;
        let hp = BOSS_MAX_HP;
        let hits = 0;
        let clicks = [];
        let bossPhase = 'normal'; // normal, angry, dying, random themes, victory
        let mouthTimer = null;

        const container = document.getElementById('boss-container');
        const bossNormal = document.getElementById('boss-normal');
        const bossHit = document.getElementById('boss-hit');
        const bossDying = document.getElementById('boss-dying');
        const bossDead = document.getElementById('boss-dead');
        const bossVictory = document.getElementById('boss-victory');
        const hpBar = document.getElementById('hp-bar-inner');
        const hpText = document.getElementById('hp-text');
        const hpLabel = document.getElementById('hp-label');
        const dmgDisplay = document.getElementById('damage-display');
        const phaseMsg = document.getElementById('phase-msg');
        const ppsEl = document.getElementById('pps');
        const koFlash = document.getElementById('ko-flash');
        const colorFlash = document.getElementById('color-flash');
        const blackholeOverlay = document.getElementById('blackhole-overlay');
        const matrixCanvas = document.getElementById('matrix-canvas');
        const matrixCtx = matrixCanvas.getContext('2d');
        const crownEl = document.getElementById('crown');

        let matrixRunning = false;
        let matrixDrops = [];
        let nextMilestone = null;
        let critChance = 0.08;

        // 工具函數
        const rand = (min, max) => Math.random() * (max - min) + min;
        const randInt = (min, max) => Math.floor(rand(min, max + 1));
        const pick = arr => arr[Math.floor(Math.random() * arr.length)];

        const bossAnimations = ['catSpin', 'catBounce', 'catWobble', 'catJelly', 'catFlipX', 'catFlipY'];

        const emojiSets = {
            angry:     ['💢', '😡', '🔥', '💥', '⚡'],
            dying:     ['💀', '☠️', '😵', '💫', '⭐', '😵‍💫'],
            zombie:    ['💀', '🧟', '☠️', '🦴', '🧠', '👻'],
            glitch:    ['⚡', '💥', '🔥', '❌', '⚠️', '💢', '🌀'],
            chaos:     ['💀', '🌈', '🎆', '✨', '💫', '🤯', '👾', '🌪️', '☄️', '💣'],
            blackhole: ['🕳️', '🌑', '🌀', '💫', '☄️', '🌌', '⚫'],
            matrix:    ['0', '1', '🟩', '💊', '🖥️', '⌨️'],
            frozen:    ['❄️', '🧊', '🥶', '⛄', '🌨️', '💎'],
            inferno:   ['🔥', '🌋', '☀️', '💥', '🧨', '😈', '👹'],
            victory:   ['✨', '🌟', '⭐', '💛', '👑', '🏆', '🎆', '🎇', '🌈', '🦋', '🕊️', '💎'],
        };

        const msgAngry = ['Boss 怒了！', '你找死！', '敢打我？！', '哼！不痛！', '就這？'];
        const msgDying = ['Boss 快撐不住了！', '不...不可能！', '我不會輸！', '再來啊！', '可惡...'];
        const msgZombie = ['不死之身！', '殭屍 Boss！', '我不會倒下！'];
        const msgGlitch = ['系̸統̶錯̵誤̸', 'Boss.exe 崩潰', '現̸實̶裂̵開̸'];
        const msgChaos = ['混沌之力！', '毀滅一切！', '嘎嘎嘎！！'];
        const msgBlackhole = ['黑洞吞噬！', '重力崩塌！', '時空扭曲！'];
        const msgMatrix = ['進入母體...', '你看到了嗎？', 'ERROR 404'];
        const msgFrozen = ['冰封！', '絕對零度！', '凍住了！'];
        const msgInferno = ['地獄業火！', '燃燒吧！', '全部燒光！'];
        const msgVictory = ['Boss 被打倒了！', '勝利！！！', '你是最強的！'];

        const themeData = {
            zombie:    { flash: '#00ff00', color: '#00ff41', bg: '#0a1a0a', shadow: '0 0 20px rgba(0,255,65,0.8)', msgs: msgZombie, emojis: emojiSets.zombie },
            glitch:    { flash: '#ff0000', color: '#ff0040', bg: '#0a0010', shadow: '0 0 25px rgba(255,0,64,0.9), 3px 0 #0ff, -3px 0 #f0f', msgs: msgGlitch, emojis: emojiSets.glitch },
            chaos:     { flash: '#ff00ff', color: '#fff', bg: '#000', shadow: '0 0 30px #fff, 0 0 60px #f0f', msgs: msgChaos, emojis: emojiSets.chaos },
            blackhole: { flash: '#000', color: '#a78bfa', bg: '#05000d', shadow: '0 0 25px rgba(167,139,250,0.9)', msgs: msgBlackhole, emojis: emojiSets.blackhole },
            matrix:    { flash: '#00ff00', color: '#00ff41', bg: '#000800', shadow: '0 0 20px rgba(0,255,65,0.8)', msgs: msgMatrix, emojis: emojiSets.matrix, font: 'monospace' },
            frozen:    { flash: '#88ddff', color: '#88ddff', bg: '#050a1a', shadow: '0 0 20px rgba(136,221,255,0.9)', msgs: msgFrozen, emojis: emojiSets.frozen },
            inferno:   { flash: '#ff4400', color: '#ff4400', bg: '#1a0500', shadow: '0 0 25px rgba(255,68,0,0.9)', msgs: msgInferno, emojis: emojiSets.inferno },
        };
        const themeKeys = Object.keys(themeData);

        // 音效
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playHit() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(400 + Math.random() * 200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playCrit() {
            playHit();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.15);
        }

        function playVictory() {
            const notes = [523, 659, 784, 1047];
            notes.forEach((freq, i) => {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                    osc.start(audioCtx.currentTime);
                    osc.stop(audioCtx.currentTime + 0.4);
                }, i * 150);
            });
        }

        function randomSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = pick(['sine', 'square', 'sawtooth', 'triangle']);
            osc.frequency.setValueAtTime(rand(50, 2000), audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(rand(20, 800), audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.15);
        }

        // 特效工具
        function spawnEmoji(set, count) {
            for (let i = 0; i < count; i++) {
                const e = document.createElement('div');
                e.className = 'emoji-float';
                e.textContent = pick(set);
                e.style.left = rand(5, 90) + 'vw';
                e.style.top = rand(-10, 10) + '%';
                e.style.fontSize = rand(20, 60) + 'px';
                e.style.animationDuration = rand(0.8, 2) + 's';
                document.body.appendChild(e);
                setTimeout(() => e.remove(), 2000);
            }
        }

        function flashColor() {
            const c = `hsl(${randInt(0,360)}, 100%, 50%)`;
            colorFlash.style.background = c;
            colorFlash.style.opacity = '0.4';
            setTimeout(() => { colorFlash.style.opacity = '0'; }, 150);
        }

        function randomBossAnim(dur) {
            const a = pick(bossAnimations);
            container.style.animation = `${a} ${dur || 0.5}s ease-in-out`;
            setTimeout(() => { container.style.animation = ''; }, (dur || 0.5) * 1000);
        }

        function randomFilter() {
            const f = pick([
                `hue-rotate(${randInt(0,360)}deg)`, `saturate(${rand(2,5)})`,
                `brightness(${rand(0.5,2)})`, `contrast(${rand(1.5,3)})`,
                `invert(${rand(0.3,1)})`, `sepia(${rand(0.5,1)})`,
            ]);
            container.style.filter = f;
            setTimeout(() => { container.style.filter = ''; }, 300);
        }

        function randomShake(intensity) {
            const i = intensity || 15;
            document.body.style.transform = `translate(${rand(-i,i)}px, ${rand(-i,i)}px) rotate(${rand(-3,3)}deg)`;
            setTimeout(() => { document.body.style.transform = ''; }, 100);
        }

        function randomSize() {
            const s = rand(0.5, 1.8);
            container.style.transform = `scale(${s})`;
            setTimeout(() => { container.style.transform = ''; }, 400);
        }

        function randomOffset() {
            const x = rand(-100, 100), y = rand(-50, 50);
            container.style.transform = `translate(${x}px, ${y}px)`;
            setTimeout(() => { container.style.transform = ''; }, 300);
        }

        function randomBg() {
            document.body.style.background = `hsl(${randInt(0,360)}, ${randInt(30,80)}%, ${randInt(5,20)}%)`;
        }

        function glitchEffect() {
            container.style.animation = `glitchShift 0.3s steps(6) ${randInt(1,3)}`;
            setTimeout(() => { container.style.animation = ''; }, 900);
        }

        function vortexParticles() {
            const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
            for (let i = 0; i < randInt(3, 6); i++) {
                const p = document.createElement('div');
                p.className = 'vortex-particle';
                const angle = rand(0, Math.PI * 2), dist = rand(100, 400);
                const sx = cx + Math.cos(angle) * dist, sy = cy + Math.sin(angle) * dist;
                p.style.left = sx + 'px'; p.style.top = sy + 'px';
                p.style.background = pick(['#8b5cf6', '#6d28d9', '#4c1d95', '#a78bfa', '#fff']);
                p.style.setProperty('--ex', (cx - sx) + 'px');
                p.style.setProperty('--ey', (cy - sy) + 'px');
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 1500);
            }
        }

        function startMatrix() {
            if (matrixRunning) return;
            matrixRunning = true;
            matrixCanvas.width = window.innerWidth;
            matrixCanvas.height = window.innerHeight;
            matrixCanvas.style.opacity = '0.4';
            const cols = Math.floor(matrixCanvas.width / 14);
            matrixDrops = Array(cols).fill(1);
            function draw() {
                if (!matrixRunning) return;
                matrixCtx.fillStyle = 'rgba(0,0,0,0.05)';
                matrixCtx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);
                matrixCtx.font = '14px monospace';
                for (let i = 0; i < matrixDrops.length; i++) {
                    matrixCtx.fillStyle = Math.random() > 0.9 ? '#fff' : `hsl(120,100%,${rand(40,70)}%)`;
                    matrixCtx.fillText(String.fromCharCode(0x30A0 + Math.random() * 96), i * 14, matrixDrops[i] * 14);
                    if (matrixDrops[i] * 14 > matrixCanvas.height && Math.random() > 0.975) matrixDrops[i] = 0;
                    matrixDrops[i]++;
                }
                requestAnimationFrame(draw);
            }
            draw();
        }

        function spawnFirework(x, y) {
            const fw = document.createElement('div');
            fw.className = 'firework';
            fw.style.left = x + 'px'; fw.style.top = y + 'px';
            const colors = ['#ffd700', '#ff6b6b', '#48dbfb', '#ff9ff3', '#fff', '#ffa500'];
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'firework-particle';
                p.style.background = pick(colors);
                const angle = (i / 20) * Math.PI * 2, dist = rand(40, 120);
                p.style.setProperty('--fx', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--fy', Math.sin(angle) * dist + 'px');
                fw.appendChild(p);
            }
            document.body.appendChild(fw);
            setTimeout(() => fw.remove(), 1000);
        }

        // 主題隨機效果
        const themeEffects = {
            zombie: () => { const e = [() => spawnEmoji(emojiSets.zombie, randInt(1,3)), () => randomBossAnim(0.4), () => randomFilter(), () => flashColor(), () => randomShake(10), () => randomSound()]; for (let i = 0; i < randInt(1,2); i++) pick(e)(); },
            glitch: () => { const e = [() => spawnEmoji(emojiSets.glitch, randInt(2,5)), () => glitchEffect(), () => randomFilter(), () => randomBossAnim(0.3), () => flashColor(), () => randomShake(20), () => randomBg(), () => randomSize(), () => randomSound()]; for (let i = 0; i < randInt(2,3); i++) pick(e)(); },
            chaos: () => { const e = [() => spawnEmoji(emojiSets.chaos, randInt(3,8)), () => glitchEffect(), () => randomFilter(), () => randomBossAnim(rand(0.2,0.6)), () => flashColor(), () => randomShake(30), () => randomBg(), () => randomSize(), () => randomOffset(), () => randomSound(), () => { document.body.style.filter = `hue-rotate(${randInt(0,360)}deg)`; setTimeout(() => { document.body.style.filter = ''; }, 200); }]; for (let i = 0; i < randInt(3,6); i++) pick(e)(); },
            blackhole: () => { const e = [() => vortexParticles(), () => spawnEmoji(emojiSets.blackhole, randInt(1,4)), () => { container.style.animation = `suckIn ${rand(0.3,0.8)}s ease-in-out`; setTimeout(() => { container.style.animation = ''; }, 800); }, () => randomShake(25), () => randomSound()]; for (let i = 0; i < randInt(2,4); i++) pick(e)(); },
            matrix: () => { const e = [() => spawnEmoji(emojiSets.matrix, randInt(2,5)), () => glitchEffect(), () => randomBossAnim(0.3), () => randomShake(15), () => randomSound()]; for (let i = 0; i < randInt(2,3); i++) pick(e)(); },
            frozen: () => { const e = [() => spawnEmoji(emojiSets.frozen, randInt(2,5)), () => { container.style.filter = `hue-rotate(${randInt(180,220)}deg) brightness(${rand(1,1.8)})`; setTimeout(() => { container.style.filter = ''; }, 400); }, () => randomBossAnim(rand(0.3,0.8)), () => randomShake(12), () => randomSound(), () => flashColor()]; for (let i = 0; i < randInt(2,4); i++) pick(e)(); },
            inferno: () => { const e = [() => spawnEmoji(emojiSets.inferno, randInt(3,6)), () => randomBossAnim(rand(0.2,0.5)), () => { const c = pick(['#ff0000','#ff4400','#ff6600','#ff8800']); document.body.style.background = c; setTimeout(() => { document.body.style.background = '#1a0500'; }, 150); }, () => randomShake(20), () => randomSound(), () => glitchEffect()]; for (let i = 0; i < randInt(3,5); i++) pick(e)(); },
        };

        // 更新 HP 顯示
        function updateHP() {
            const pct = Math.max(0, hp / BOSS_MAX_HP * 100);
            hpBar.style.width = pct + '%';
            hpText.textContent = Math.max(0, hp) + ' / ' + BOSS_MAX_HP;

            // HP 顏色變化
            if (pct > 60) {
                hpBar.style.background = 'linear-gradient(90deg, #ff4757, #ff6b81)';
            } else if (pct > 30) {
                hpBar.style.background = 'linear-gradient(90deg, #ffa502, #ff6348)';
            } else {
                hpBar.style.background = 'linear-gradient(90deg, #ff0000, #cc0000)';
                hpBar.style.animation = pct < 15 ? 'blink 0.5s infinite alternate' : '';
            }
        }

        // 選 Boss SVG
        function showBoss(open) {
            bossNormal.style.display = 'none';
            bossHit.style.display = 'none';
            bossDying.style.display = 'none';
            bossDead.style.display = 'none';
            bossVictory.style.display = 'none';

            if (bossPhase === 'victory') {
                bossVictory.style.display = 'block';
                return;
            }

            let closedSvg, openSvg;
            const hpPct = hp / BOSS_MAX_HP;
            if (hpPct > 0.5) {
                closedSvg = bossNormal; openSvg = bossHit;
            } else if (hpPct > 0.1) {
                closedSvg = bossDying; openSvg = bossDying;
            } else {
                closedSvg = bossDead; openSvg = bossDead;
            }

            if (open) openSvg.style.display = 'block';
            else closedSvg.style.display = 'block';
        }

        // 打 Boss！
        function hitBoss(e) {
            e.preventDefault();
            if (hp <= 0) return;

            // 計算傷害
            const isCrit = Math.random() < critChance;
            const dmg = isCrit ? randInt(3, 8) : 1;
            hp -= dmg;
            hits += dmg;

            // 傷害數字
            const dmgText = document.createElement('div');
            dmgText.className = 'dmg-text';
            dmgText.textContent = isCrit ? `-${dmg} 暴擊！` : `-${dmg}`;
            if (isCrit) { dmgText.style.color = '#ff4757'; dmgText.style.fontSize = '36px'; }
            dmgText.style.left = rand(50, 200) + 'px';
            dmgText.style.top = rand(50, 150) + 'px';
            container.appendChild(dmgText);
            setTimeout(() => dmgText.remove(), 800);

            dmgDisplay.textContent = isCrit ? `暴擊！-${dmg} HP` : `-${dmg} HP`;

            updateHP();

            // 音效
            isCrit ? playCrit() : playHit();

            // Boss 反應
            showBoss(true);
            clearTimeout(mouthTimer);
            mouthTimer = setTimeout(() => showBoss(false), 120);

            // 粒子
            let colors, pCount;
            const hpPct = hp / BOSS_MAX_HP;
            if (hpPct > 0.5) { colors = ['#ff6b6b', '#ffe66d', '#ff4757']; pCount = isCrit ? 10 : 5; }
            else if (hpPct > 0.1) { colors = ['#ff4757', '#8b0000', '#ff0000', '#fff']; pCount = isCrit ? 15 : 8; }
            else { colors = ['#ff0000', '#cc0000', '#880000', '#fff', '#ffd700']; pCount = isCrit ? 20 : 12; }

            for (let i = 0; i < pCount; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.background = pick(colors);
                p.style.left = '150px'; p.style.top = '150px';
                const angle = Math.random() * Math.PI * 2, dist = 50 + Math.random() * 80;
                p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
                container.appendChild(p);
                setTimeout(() => p.remove(), 600);
            }

            // === 階段轉換 ===
            const totalDmg = BOSS_MAX_HP - hp;

            // 100: Boss 開始生氣
            if (totalDmg === 100 && bossPhase === 'normal') {
                bossPhase = 'angry';
                phaseMsg.textContent = pick(msgAngry);
                phaseMsg.style.color = '#ff6b6b';
                phaseMsg.style.display = 'block';
                document.body.style.background = '#1a1020';
            }

            // 500: Boss 開始受傷
            if (totalDmg === 500 && bossPhase === 'angry') {
                bossPhase = 'hurt';
                phaseMsg.textContent = pick(msgDying);
                phaseMsg.style.color = '#ff4757';
                phaseMsg.style.fontSize = '28px';
                phaseMsg.style.display = 'block';
                document.body.classList.add('screen-shake');
                setTimeout(() => document.body.classList.remove('screen-shake'), 600);
                spawnEmoji(emojiSets.dying, 8);
            }

            // 1000+ 隨機主題切換
            if (!nextMilestone) nextMilestone = 1000;
            if (totalDmg === nextMilestone && totalDmg < BOSS_MAX_HP && bossPhase !== 'victory') {
                nextMilestone = totalDmg + randInt(200, 800);

                // 清理前一個狀態
                blackholeOverlay.style.opacity = '0';
                matrixRunning = false;
                matrixCanvas.style.opacity = '0';

                const newTheme = pick(themeKeys);
                bossPhase = newTheme;
                const t = themeData[newTheme];

                koFlash.style.background = t.flash;
                koFlash.style.opacity = '1';
                setTimeout(() => { koFlash.style.opacity = '0'; koFlash.style.background = '#fff'; }, 200);
                document.body.classList.add('screen-shake');
                setTimeout(() => document.body.classList.remove('screen-shake'), 800);

                phaseMsg.textContent = pick(t.msgs);
                phaseMsg.style.color = t.color;
                phaseMsg.style.fontSize = randInt(26, 34) + 'px';
                phaseMsg.style.textShadow = t.shadow;
                phaseMsg.style.fontFamily = t.font || 'Arial, sans-serif';
                phaseMsg.style.display = 'block';
                phaseMsg.style.animation = 'none';
                void phaseMsg.offsetWidth;
                phaseMsg.style.animation = 'shake 0.5s ease-in-out';
                document.body.style.background = t.bg;

                if (newTheme === 'blackhole') { blackholeOverlay.style.opacity = '1'; vortexParticles(); }
                if (newTheme === 'matrix') startMatrix();

                spawnEmoji(t.emojis, randInt(10, 20));
            }

            // 隨機效果觸發
            if (totalDmg >= 100 && totalDmg < 500) {
                // 輕微效果
                if (Math.random() < 0.3) pick([() => randomBossAnim(0.3), () => flashColor(), () => randomShake(5)])();
            }
            if (totalDmg >= 500 && totalDmg < 1000) {
                if (Math.random() < 0.5) {
                    const e = [() => randomBossAnim(0.3), () => flashColor(), () => randomShake(8), () => spawnEmoji(emojiSets.dying, randInt(1,2)), () => randomSound()];
                    pick(e)();
                }
            }
            if (themeEffects[bossPhase]) themeEffects[bossPhase]();

            // 勝利！
            if (hp <= 0) {
                hp = 0;
                bossPhase = 'victory';
                updateHP();

                // 清理
                blackholeOverlay.style.opacity = '0';
                matrixRunning = false;
                matrixCanvas.style.opacity = '0';

                // 勝利特效
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        koFlash.style.background = `hsl(${randInt(0,360)}, 100%, 50%)`;
                        koFlash.style.opacity = '0.8';
                        setTimeout(() => { koFlash.style.opacity = '0'; }, 100);
                    }, i * 150);
                }
                setTimeout(() => { koFlash.style.background = '#ffd700'; koFlash.style.opacity = '1'; setTimeout(() => { koFlash.style.opacity = '0'; koFlash.style.background = '#fff'; }, 500); }, 800);

                document.body.classList.add('screen-shake');
                setTimeout(() => document.body.classList.remove('screen-shake'), 1000);

                for (let i = 0; i < 15; i++) {
                    setTimeout(() => spawnFirework(rand(50, window.innerWidth - 50), rand(50, window.innerHeight - 50)), i * 200);
                }

                setTimeout(() => {
                    showBoss(false);
                    crownEl.style.display = 'block';
                    document.body.style.background = '#1a0f00';
                    phaseMsg.textContent = pick(msgVictory);
                    phaseMsg.style.color = '#ffd700';
                    phaseMsg.style.fontSize = '36px';
                    phaseMsg.style.textShadow = '0 0 30px #ffd700, 0 0 60px rgba(255,215,0,0.5)';
                    hpLabel.textContent = 'BOSS DEFEATED!';
                    hpLabel.style.color = '#ffd700';
                    spawnEmoji(emojiSets.victory, 30);
                    playVictory();
                }, 1000);
            }

            // PPS
            const now = Date.now();
            clicks.push(now);
            clicks = clicks.filter(t => now - t < 1000);
        }

        // PPS 更新
        setInterval(() => {
            const now = Date.now();
            clicks = clicks.filter(t => now - t < 1000);
            ppsEl.textContent = '每秒攻擊: ' + clicks.length;
        }, 200);

        // 初始化
        updateHP();
        showBoss(false);
    </script>
</body>
</html>
